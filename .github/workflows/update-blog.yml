name: Update Blog Content

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: midnight, 6am, noon, 6pm UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest news
        run: python fetch_blog.py

      - name: Commit blog-data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog-data.json sitemap.xml
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update blog content $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
            git push
          )
